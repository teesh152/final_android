                  android:title="@string/search"
                  android:icon="@android:drawable/ic_menu_search"
                  app:showAsAction="ifRoom|collapseActionView"
                  app:actionViewClass="androidx.appcompat.widget.SearchView" />

              <item
                  android:id="@+id/action_refresh"
                  android:title="@string/refresh"
                  app:showAsAction="never" />

              <item
                  android:id="@+id/action_about"
                  android:title="@string/about"
                  app:showAsAction="never" />
          </menu>
          EOF

          # ---------------- Drawables ----------------
          cat > app/src/main/res/drawable/custom_button.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient
                  android:startColor="#FF0000"
                  android:endColor="#C4302B"
                  android:angle="45" />
              <corners android:radius="24dp" />
              <padding android:top="12dp" android:bottom="12dp" />
          </shape>
          EOF

          cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#FF0000" android:pathData="M0,0h108v108h-108z" />
              <path android:fillColor="#FFFFFF" android:pathData="M44,36l28,18l-28,18z" />
          </vector>
          EOF

          # ---------------- Values ----------------
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">Tube Explorer</string>
              <string name="search">Search</string>
              <string name="refresh">Refresh</string>
              <string name="about">About</string>
              <string name="watch_youtube">Watch on YouTube</string>
              <string name="thumb_desc">Video thumbnail</string>
          </resources>
          EOF

          cat > app/src/main/res/values/colors.xml << 'EOF'
          <resources>
              <color name="red_500">#FFFF0000</color>
              <color name="red_700">#FFC4302B</color>
              <color name="grey_dark">#FF282828</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
              <style name="Theme.TubeExplorer" parent="Theme.MaterialComponents.DayNight.DarkActionBar">
                  <item name="colorPrimary">@color/red_500</item>
                  <item name="colorPrimaryVariant">@color/red_700</item>
                  <item name="colorOnPrimary">@color/white</item>
                  <item name="colorSecondary">@color/grey_dark</item>
              </style>
          </resources>
          EOF

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Copy APK to repo root
        run: cp app/build/outputs/apk/debug/app-debug.apk TubeExplorer.apk

      - name: Commit source and APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "MOB2 Final Project (YouTube API): source + APK [skip ci]" || echo "Nothing to commit"
          git push

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TubeExplorer-APK
          path: app/build/outputs/apk/debug/app-debug.apk
